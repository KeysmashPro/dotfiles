set-environment -g PATH "$HOME/.nix-profile/bin:$PATH"


set -s escape-time 10


bind -n C-S-Up  copy-mode \; send-keys -X cursor-up
bind -n C-S-Down copy-mode \; send-keys -X cursor-down

bind -n C-S-PageUp   copy-mode \; send-keys -X page-up
bind -n C-S-PageDown copy-mode \; send-keys -X page-down

# Выйти из copy-mode по Escape
bind -T copy-mode-vi C-c send-keys -X cancel


#set  -g default-terminal "tmux-256color"
#set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB,kitty:RGB"

#unbind -a -T root
#bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded'

bind -n M-Enter new-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D 3

bind -n M-b split-window -h
bind -n M-h split-window -v

#unbind-key -a -T root

set -g pane-border-lines double

set  -g base-index      1
setw -g pane-base-index 1

setw -g mode-keys   vi
set  -g focus-events on

#set  -g mouse             on
#set  -s escape-time       0
#set  -g history-limit     2000

#bind -n M-s choose-tree -s

bind -n M-Enter new-window
bind -n M-c kill-pane
bind -n M-q kill-window
bind -n M-d detach
bind -n M-Q confirm-before -p "Kill entire session? (y/n)" kill-session

#bind -T copy-mode-vi v send -X begin-selection
#bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy || xclip -in -selection clipboard"
#bind -n M-/ copy-mode \; command-prompt -p "(search down)" "send -X search-forward '%%%'"
#bind -n M-? copy-mode \; command-prompt -p "(search up)"   "send -X search-backward '%%%'"

#set -g @plugin 'tmux-plugins/tpm'

#set -g @plugin 'egel/tmux-gruvbox'

#set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @plugin 'tmux-plugins/tmux-continuum'

#set -g @continuum-restore 'on'
#set -g @continuum-save-interval '15'

#run '~/.config/tmux/plugins/tpm/tpm'
