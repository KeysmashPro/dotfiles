allow_remote_control yes
dynamic_background_opacity yes
dynamic_background_color yes
listen_on unix:@mykitty

map ctrl+k scroll_line_up
map ctrl+j scroll_line_down
map ctrl+page_up scroll_line_page_up
map ctrl+page_down scroll_line_page_down
map ctrl+home scroll_home
map ctrl+end scroll_end

map ctrl+, combine : set_colors background=#080808 : set_background_opacity 0.7
map ctrl+. combine : set_colors background=#000000 : set_background_opacity 1.0
"14161b
"141415
font_family firacode
font_size 10.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 1 
confirm_os_window_close 0

linux_display_server auto

scrollback_lines 5000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

foreground #dddddd
background #0F0F0F
cursor #dddddd
vim:ft=kitty
